<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peleg Notify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <div id="notification-container" class="notification-container top-right"></div>
        <div id="sound-toggle" class="sound-toggle" title="Toggle Sound">
            <i id="sound-toggle-icon" class="fa-solid fa-volume-up"></i>
        </div>

        <audio id="notificationSound" preload="auto">
            <source src="sound.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script src="app.js"></script>
</body>
</html>
